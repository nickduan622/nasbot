services:
  # ============ 下载客户端 ============
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbit-pt
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8092
    volumes:
      - ${CONFIG_DIR}/qbittorrent:/config
      - ${MEDIA_DIR}:/media
    ports:
      - "8092:8092"
      - "6882:6881"
      - "6882:6881/udp"
    restart: unless-stopped

  # ============ 索引搜索 ============
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Asia/Shanghai
    volumes:
      - ${CONFIG_DIR}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  # Cloudflare 反爬绕过（公开站需要）
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8191:8191"
    restart: unless-stopped

  # ============ 电影管理 ============
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Asia/Shanghai
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${MEDIA_DIR}:/media
    ports:
      - "7878:7878"
    restart: unless-stopped

  # ============ 剧集管理 ============
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Asia/Shanghai
    volumes:
      - ${CONFIG_DIR}/sonarr:/config
      - ${MEDIA_DIR}:/media
    ports:
      - "8989:8989"
    restart: unless-stopped

  # ============ 中文字幕 ============
  chinesesubfinder:
    image: allanpk716/chinesesubfinder:latest
    container_name: chinesesubfinder
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Asia/Shanghai
    volumes:
      - ${CONFIG_DIR}/chinesesubfinder:/config
      - ${MEDIA_DIR}/movies:/media/movies
      - ${MEDIA_DIR}/tv:/media/tv
    ports:
      - "19035:19035"
    restart: unless-stopped

networks:
  default:
    name: media-stack
